<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inputs — Sistema genérico</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-sans: 'Inter', sans-serif;
      --brand-primary: #002D72; --brand-primary-subtle: #E5EBEF;
      --error: #E40046; --error-subtle: #FEE5EB;
      --text-primary: #1a1a1a; --text-secondary: #5F5E5A; --text-tertiary: #888780;
      --bg-page: #F4F3F0; --bg-surface: #ffffff; --bg-disabled: #F4F3F0;
      --border-default: rgba(0,0,0,0.15); --border-hover: rgba(0,0,0,0.3);
      --radius-md: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-sans); background: var(--bg-page); padding: 48px 32px; max-width: 600px; margin: 0 auto; }
    .section { margin-bottom: 2rem; }
    .section-label { font-size: 11px; font-weight: 500; color: var(--text-tertiary); letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 1rem; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1.25rem; }
    .field__label { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
    .field__label span { color: var(--error); margin-left: 2px; }
    .field__wrap { position: relative; }
    .field__input {
      width: 100%; height: 40px; padding: 0 12px;
      font-family: var(--font-sans); font-size: 14px; color: var(--text-primary);
      background: var(--bg-surface); border: 1px solid var(--border-default);
      border-radius: var(--radius-md); outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field__input::placeholder { color: var(--text-tertiary); }
    .field__input:hover  { border-color: var(--border-hover); }
    .field__input:focus  { border-color: var(--brand-primary); box-shadow: 0 0 0 3px rgba(0,45,114,0.1); }
    .field__input--error { border-color: var(--error); }
    .field__input--error:focus { box-shadow: 0 0 0 3px rgba(228,0,70,0.1); }
    .field__input--disabled { background: var(--bg-disabled); color: var(--text-tertiary); cursor: not-allowed; }
    .field__input--icon-l { padding-left: 38px; }
    .field__input--icon-r { padding-right: 38px; }
    .field__icon { position: absolute; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); display: flex; align-items: center; }
    .field__icon--left  { left: 11px; }
    .field__icon--right { right: 11px; cursor: pointer; }
    .field__helper { font-size: 12px; color: var(--text-tertiary); }
    .field__error  { font-size: 12px; color: var(--error); }
    .field__count  { font-size: 11px; color: var(--text-tertiary); text-align: right; }
    textarea.field__input { height: auto; padding: 10px 12px; resize: vertical; min-height: 96px; line-height: 1.5; }
    .select-wrap { position: relative; }
    select.field__input { appearance: none; padding-right: 36px; cursor: pointer; }
    .select-arrow { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--text-tertiary); }
  </style>
</head>
<body>

  <div class="section">
    <p class="section-label">Input text — estados</p>

    <div class="field">
      <label class="field__label">Default</label>
      <input class="field__input" type="text" placeholder="Escribe algo..." />
    </div>

    <div class="field">
      <label class="field__label">Con ícono izquierdo</label>
      <div class="field__wrap">
        <span class="field__icon field__icon--left">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input class="field__input field__input--icon-l" type="text" placeholder="Buscar..." />
      </div>
    </div>

    <div class="field">
      <label class="field__label">Requerido<span>*</span></label>
      <input class="field__input" type="email" placeholder="tucorreo@ejemplo.com" />
      <p class="field__helper">Usaremos este correo para enviarte confirmaciones.</p>
    </div>

    <div class="field">
      <label class="field__label">Con error</label>
      <input class="field__input field__input--error" type="email" value="correo-invalido" />
      <p class="field__error">Ingresa un correo electrónico válido.</p>
    </div>

    <div class="field">
      <label class="field__label">Deshabilitado</label>
      <input class="field__input field__input--disabled" type="text" value="Valor fijo" disabled />
    </div>
  </div>

  <div class="section">
    <p class="section-label">Textarea</p>
    <div class="field">
      <label class="field__label">Mensaje</label>
      <textarea class="field__input" placeholder="Escribe tu mensaje aquí..." maxlength="300" id="ta" oninput="document.getElementById('taCount').textContent = this.value.length + '/300'"></textarea>
      <p class="field__count" id="taCount">0/300</p>
    </div>
  </div>

  <div class="section">
    <p class="section-label">Select</p>
    <div class="field">
      <label class="field__label">Especialidad</label>
      <div class="select-wrap">
        <select class="field__input">
          <option value="" disabled selected>Selecciona una opción</option>
          <option>Cardiología</option>
          <option>Pediatría</option>
          <option>Neurología</option>
          <option>Medicina general</option>
        </select>
        <span class="select-arrow">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </span>
      </div>
    </div>
  </div>

</body>
</html>
